<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración de Empleados</title>
    <link rel="stylesheet" href="./styles/main.css">
    <link rel="stylesheet" href="./styles/login.css">
</head>
<body>
    <header class="login-header">
        <h1>Panel de Administración de Empleados</h1>
        <p>Gestión eficiente para profesionales de operaciones y recursos humanos</p>
    </header>
    <main>
     <section>
      <h2>Iniciar sesión</h2>
      <p>
        Ingresa tus credenciales para acceder al panel.
      </p>
      <form>

        <div>
          <label for="email">Correo electrónico</label>
          <input type= "email" id="email" name="email" placeholder="nombre@empresa.com">
        </div>

        <div>
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password"  placeholder="********">
        </div>
        <button type="submit">Iniciar sesión</button>
      </form>
      <section>
        <h3>Credenciales de demostración</h3>
        <p>Email: admin@paneladmin.com</p>
        <p>Contraseña: Admin123</p>
      </section>
    </section>
  </main>
<footer>
    <p>
      © 2026 Panel de Administración de Empleados
    </p>
  </footer>
 <script type="module" src="./scripts/login.js"></script> 
</body>
</html>
